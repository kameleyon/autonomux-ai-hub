<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F0F1A"/>
      <stop offset="100%" style="stop-color:#1A1A2E"/>
    </linearGradient>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E81E25"/>
      <stop offset="100%" style="stop-color:#F7941D"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E81E25;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#F7941D;stop-opacity:0"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Glow orbs -->
  <circle cx="200" cy="200" r="300" fill="url(#glow)" filter="url(#blur)" opacity="0.6"/>
  <circle cx="1000" cy="450" r="250" fill="url(#glow)" filter="url(#blur)" opacity="0.4"/>

  <!-- Logo circle -->
  <circle cx="100" cy="80" r="32" fill="url(#grad)"/>
  <text x="100" y="88" font-family="Arial, sans-serif" font-size="28" fill="white" text-anchor="middle">🦎</text>

  <!-- Brand name -->
  <text x="148" y="92" font-family="Arial Black, sans-serif" font-size="32" font-weight="900" fill="url(#grad)">Autonomux</text>

  <!-- Main headline -->
  <text x="100" y="240" font-family="Arial Black, sans-serif" font-size="72" font-weight="900" fill="white">Your AI Workforce,</text>
  <text x="100" y="330" font-family="Arial Black, sans-serif" font-size="72" font-weight="900" fill="url(#grad)">One Click Away</text>

  <!-- Subheadline -->
  <text x="100" y="400" font-family="Arial, sans-serif" font-size="28" fill="#9CA3AF">Browse, deploy, and run AI agents that automate your work.</text>
  <text x="100" y="440" font-family="Arial, sans-serif" font-size="28" fill="#9CA3AF">No code. No complexity. Results in seconds.</text>

  <!-- CTA pill -->
  <rect x="100" y="490" width="340" height="64" rx="32" fill="url(#grad)"/>
  <text x="270" y="530" font-family="Arial Black, sans-serif" font-size="24" font-weight="900" fill="white" text-anchor="middle">Start Free — 25 Credits</text>

  <!-- Agent pills on the right -->
  <g transform="translate(750, 160)">
    <!-- Card 1 -->
    <rect x="0" y="0" width="380" height="70" rx="12" fill="#1E1E32" stroke="#2D2D44" stroke-width="1"/>
    <rect x="16" y="18" width="34" height="34" rx="8" fill="url(#grad)"/>
    <text x="62" y="34" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white">Blog Writer</text>
    <text x="62" y="52" font-family="Arial, sans-serif" font-size="13" fill="#6B7280">Full SEO post in 30 seconds</text>
    <text x="340" y="40" font-family="Arial, sans-serif" font-size="13" fill="#F7941D" text-anchor="end">~$0.20</text>

    <!-- Card 2 -->
    <rect x="0" y="84" width="380" height="70" rx="12" fill="#1E1E32" stroke="#2D2D44" stroke-width="1"/>
    <rect x="16" y="102" width="34" height="34" rx="8" fill="url(#grad)"/>
    <text x="62" y="118" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white">Email Responder</text>
    <text x="62" y="136" font-family="Arial, sans-serif" font-size="13" fill="#6B7280">Professional reply in your tone</text>
    <text x="340" y="124" font-family="Arial, sans-serif" font-size="13" fill="#F7941D" text-anchor="end">~$0.30</text>

    <!-- Card 3 -->
    <rect x="0" y="168" width="380" height="70" rx="12" fill="#1E1E32" stroke="#2D2D44" stroke-width="1"/>
    <rect x="16" y="186" width="34" height="34" rx="8" fill="url(#grad)"/>
    <text x="62" y="202" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white">Lead Scraper</text>
    <text x="62" y="220" font-family="Arial, sans-serif" font-size="13" fill="#6B7280">10 qualified leads with angles</text>
    <text x="340" y="208" font-family="Arial, sans-serif" font-size="13" fill="#F7941D" text-anchor="end">~$1.00</text>

    <!-- Card 4 -->
    <rect x="0" y="252" width="380" height="70" rx="12" fill="#1E1E32" stroke="#2D2D44" stroke-width="1"/>
    <rect x="16" y="270" width="34" height="34" rx="8" fill="url(#grad)"/>
    <text x="62" y="286" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white">Social Scheduler</text>
    <text x="62" y="304" font-family="Arial, sans-serif" font-size="13" fill="#6B7280">5 platform-ready posts</text>
    <text x="340" y="292" font-family="Arial, sans-serif" font-size="13" fill="#F7941D" text-anchor="end">~$0.40</text>

    <!-- Stats bar -->
    <text x="0" y="360" font-family="Arial, sans-serif" font-size="14" fill="#4B5563">10+ Agents · Free to Start · Results in Seconds</text>
  </g>

  <!-- Bottom border gradient -->
  <rect x="0" y="618" width="1200" height="12" fill="url(#grad)"/>
</svg>
