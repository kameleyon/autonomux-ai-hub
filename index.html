<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Favicon & App Icons -->
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="theme-color" content="#121111" />

    <!-- Primary Meta -->
    <title>Autonomux — Your AI Workforce</title>
    <meta name="description" content="Deploy AI agents to automate blog posts, email replies, lead lists and more. No coding required. Start free with 25 credits." />
    <meta name="author" content="Autonomux" />
    <link rel="canonical" href="https://autonomux.lovable.app/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://autonomux.lovable.app/" />
    <meta property="og:title" content="Autonomux — Your AI Workforce" />
    <meta property="og:description" content="Deploy AI agents to automate blog posts, email replies, lead lists and more. No coding required. Start free with 25 credits." />
    <meta property="og:image" content="https://autonomux.lovable.app/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="Autonomux" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@Autonomux" />
    <meta name="twitter:title" content="Autonomux — Your AI Workforce" />
    <meta name="twitter:description" content="Deploy AI agents to automate blog posts, email replies, lead lists and more. No coding required. Start free with 25 credits." />
    <meta name="twitter:image" content="https://autonomux.lovable.app/og-image.png" />

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Autonomux",
      "url": "https://autonomux.lovable.app",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Web",
      "description": "Deploy AI agents to automate blog posts, email replies, lead lists and more. No coding required.",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      }
    }
    </script>
  </head>

  <body>
    <script>
      (function() {
        var theme = localStorage.getItem('autonomux-theme');
        if (theme === 'dark') document.documentElement.classList.add('dark');
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
